name: CI

on:
  push:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
      - name: Setup .NET
        uses: actions/setup-dotnet@v3
        with:
          dotnet-version: '10.0.x'
      - name: Restaurar dependências
        run: dotnet restore ControleGastos/ControleGastos.sln
      - name: Rodar testes
        run: dotnet test ControleGastos/ControleGastos.sln  
